version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kart_db
    environment:
      POSTGRES_DB: kart_timing_db
      POSTGRES_USER: kart_user
      POSTGRES_PASSWORD: kart_secure_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kart_user -d kart_timing_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kart_backend
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  # === CLI: долгоживущий контейнер ===
  cli:
    build:
      context: .
      dockerfile: cli/Dockerfile
    container_name: kart_cli
    volumes:
      - ./cli:/app
      - cli_cache:/root/.karting
    environment:
      - KARTING_API_URL=http://backend:8000/api
      - KARTING_VERBOSE=${DEBUG:-false}
    depends_on:
      - backend
    # Контейнер не завершается - ждёт команд
    command: tail -f /dev/null
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  cli_cache: