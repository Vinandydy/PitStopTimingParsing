# docker-compose.yml (полный, объединённый)
version: '3.8'

services:
  # === Database ===
  db:
    image: postgres:15-alpine
    container_name: kart_db
    environment:
      POSTGRES_DB: kart_timing_db
      POSTGRES_USER: kart_user
      POSTGRES_PASSWORD: kart_secure_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kart_user -d kart_timing_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Backend ===
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kart_backend
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - ./backend/logs:/app/logs
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    # Доступ к Ollama на хосте (если Ollama не в этой же сети)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # === CLI ===
  cli:
    build:
      context: .
      dockerfile: cli/Dockerfile
    container_name: kart_cli
    volumes:
      - ./cli:/app
      - cli_cache:/root/.karting
    environment:
      - KARTING_API_URL=http://backend:8000/api
      - KARTING_VERBOSE=${DEBUG:-false}
    depends_on:
      - backend
    command: tail -f /dev/null
    stdin_open: true
    tty: true

  # === AI: Ollama (из docker-compose.ai.yml) ===
  ollama:
    image: ollama/ollama:latest
    container_name: kart_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    # Важно: в той же сети, что и backend/cli
    networks:
      - default

  # === AI: WebUI (опционально) ===
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: kart_webui
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  postgres_data:
  cli_cache:
  ollama_data:
  openwebui_data: